name: Create and publish a Docker image

on:
  workflow_call:
    inputs:
      has_npmrc:
        required: false
        type: boolean
        default: false
        description: |
          If true, a .npmrc file will be created to allow the use of private npm packages.
          This is useful if you are using a private npm package in your project.
          If you are not using a private npm package, you can set this to false.
          If you are not sure, you can leave it to false.

      working_directory:
        required: false
        type: string
        default: .
        description: |
          The working directory of the project.

      dockerfile_context:
        required: false
        type: string
        default: .
        description: |
          The path to the Dockerfile.

      image_name:
        required: false
        type: string
        default: ${{ github.repository }}
        description: |
          The name of the image to build and push.

    secrets:
      ENV_FILE:
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ inputs.image_name }}

permissions:
  contents: read

jobs:
  build-and-push-image:
    runs-on: cx-public-ubuntu-x64
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Create env variables if needed
        run: |
          if [[ -z "${{ secrets.ENV_FILE }}" ]]; then
            echo "env_file secret not found"
          else
            echo "${{ secrets.ENV_FILE }}" > env_file
            set -o allexport
            source env_file
            set +o allexport
            rm env_file
          fi

      - name: Create .npmrc file if needed
        if: ${{ inputs.has_npmrc == true}}
        run: |
          echo "@:registry=https://npm.pkg.github.com" > .npmrc
          echo "@MAD-Goat-Project:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Set up QEMU
        uses: step-security/setup-qemu-action@109c6ed9f089be1a250c75fd6a534e30df44e030 # v4.0.0

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Log in to the Container registry
        uses: step-security/docker-login-action@870af644803bf9f204aed474adbad2958fec048b # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: step-security/metadata-action@619b5adf759ed62ddd8c6d474364da38ea264eee # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: step-security/docker-build-push-action@846549baaf047e867d038826129a64d81df0f704 # v7.1.0
        with:
          context: ${{ inputs.dockerfile_context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
